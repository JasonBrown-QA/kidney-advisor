<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a8cb0"/>
      <stop offset="100%" stop-color="#085a78"/>
    </linearGradient>
    <linearGradient id="kidney" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e6f4f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Anatomical kidney (bean) shape, centered -->
  <g filter="url(#shadow)" transform="translate(256 256)">
    <path fill="url(#kidney)" d="
      M -90 -120
      C -150 -120, -180 -60, -180 0
      C -180 80, -140 140, -70 140
      C -30 140, 0 120, 30 120
      C 70 120, 100 140, 130 140
      C 180 140, 200 90, 200 30
      C 200 -50, 160 -120, 80 -120
      C 30 -120, 10 -100, -20 -100
      C -50 -100, -60 -120, -90 -120
      Z"/>

    <!-- Renal hilum notch (inner curve detail) -->
    <path fill="url(#bg)" d="
      M 60 -10
      C 90 -10, 110 10, 110 40
      C 110 70, 90 90, 60 90
      C 30 90, 10 70, 10 40
      C 10 10, 30 -10, 60 -10
      Z" opacity="0.92"/>

    <!-- Small inner highlight -->
    <ellipse cx="-90" cy="-40" rx="22" ry="35" fill="#ffffff" opacity="0.35"/>
  </g>

  <!-- Subtle "K" mark — small, bottom right -->
  <text x="426" y="470" font-family="-apple-system, system-ui, sans-serif" font-size="56" font-weight="700" fill="#ffffff" opacity="0.85" text-anchor="middle">K</text>
</svg>
